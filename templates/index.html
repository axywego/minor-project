<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery - Интерактивная галерея</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo" onclick="router('home')" style="cursor:pointer">
                <div class="logo-icon">🎨</div>
                <span class="logo-text">ГАЛЕРЕЯ</span>
            </div>

            <div class="search-box">
                <input type="text" id="search-input" placeholder="Поиск по названию картины и/или автору">
                <button class="search-btn" onclick="handleSearch()">🔍</button>
            </div>

            <div class="language-switch">
                <button class="lang-btn active" data-lang="ru" onclick="changeLanguage('ru')">RU</button>
                <button class="lang-btn" data-lang="en" onclick="changeLanguage('en')">EN</button>
                <button class="lang-btn" data-lang="de" onclick="changeLanguage('de')">DE</button>
            </div>
        </div>
    </header>

    <div id="login-modal" class="modal" style="display: none;">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <h3>Вход для администратора</h3>
            <input type="password" id="admin-password" placeholder="Пароль">
            <div class="modal-buttons">
                <button onclick="adminLogin()">Войти</button>
                <button onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>

    <main id="app">
        <div class="loader">Загрузка...</div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4 data-i18n="footer.contacts">Контакты</h4>
                    <p data-i18n="footer.contacts.address">📍 ул. Искусств, 15, Москва</p>
                    <p>📞 +7 (495) 123-45-67</p>
                    <p>✉️ info@artgallery.ru</p>
                </div>
                <div class="footer-section">
                    <h4 data-i18n="footer.hours">Режим работы</h4>
                    <p data-i18n="footer.weekdays">Пн-Пт: 10:00 - 20:00</p>
                    <p data-i18n="footer.holidays">Сб-Вс: 11:00 - 22:00</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Art Gallery. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <script type="module" src="/static/js/main.js"></script>
    <!-- <script src="/static/js/script.js"></script> -->
</body>

</html>
